<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow - Tasks</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo">FocusFlow</div>
            <nav class="nav-menu">
                <a href="#" class="nav-item">
                    <span class="icon">🏠</span> Dashboard
                </a>
                <a href="#" class="nav-item active">
                    <span class="icon">📝</span> Tasks
                </a>
                <a href="#" class="nav-item">
                    <span class="icon">🔥</span> Habits
                </a>
                <a href="#" class="nav-item">
                    <span class="icon">🤖</span> AI Coach
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header page-header">
                <h1>Tasks</h1>
            </header>

            <div class="top-actions">
                <button class="btn-primary btn-large">ADD TASK</button>
            </div>

            <div class="tasks-grid">
                
                <div class="card task-card">
                    <h2 class="task-title">DBMS Assignment</h2>
                    
                    <div class="task-details">
                        <div class="detail-row">
                            <span class="label">Due:</span>
                            <span class="value">28 June</span>
                        </div>
                        <div class="detail-row">
                            <span class="label">Priority:</span>
                            <span class="value priority-high">High</span>
                        </div>
                        <div class="detail-row">
                            <span class="label">Est Time:</span>
                            <span class="value">4 Hours</span>
                        </div>
                        <div class="detail-row">
                            <span class="label">Effort:</span>
                            <span class="value">Medium</span>
                        </div>
                    </div>

                    <div class="task-status">
                        Status: Pending
                    </div>

                    <div class="task-actions">
                        <button class="btn-edit">EDIT</button>
                        <button class="btn-delete">DELETE</button>
                    </div>
                </div>

                <div class="card task-card">
                    <h2 class="task-title">Hackathon Submission</h2>
                    
                    <div class="task-details">
                        <div class="detail-row">
                            <span class="label">Due:</span>
                            <span class="value">29 June</span>
                        </div>
                        <div class="detail-row">
                            <span class="label">Priority:</span>
                            <span class="value priority-high">High</span>
                        </div>
                        <div class="detail-row">
                            <span class="label">Est Time:</span>
                            <span class="value">8 Hours</span>
                        </div>
                        <div class="detail-row">
                            <span class="label">Effort:</span>
                            <span class="value">High</span>
                        </div>
                    </div>

                    <div class="task-status">
                        Status: Pending
                    </div>

                    <div class="task-actions">
                        <button class="btn-edit">EDIT</button>
                        <button class="btn-delete">DELETE</button>
                    </div>
                </div>

            </div>
        </main>
    </div>
</body>
</html>
